<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Video Framework</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; }
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "SFMono-Regular", Consolas, monospace;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f7f7f6;
        --color-background-tertiary: #efefed;
        --color-text-primary: #1a1a19;
        --color-text-secondary: #5c5c5a;
        --color-text-tertiary: #9b9b99;
        --color-border-primary: #d4d4d2;
        --color-border-secondary: #e5e5e3;
        --color-border-tertiary: #efefed;
        --border-radius-sm: 4px;
        --border-radius-md: 6px;
        --border-radius-lg: 10px;
        --color-background-info: #eff6ff;
        --color-text-info: #1d4ed8;
        --color-background-warning: #fffbeb;
        --color-text-warning: #92400e;
        --color-border-warning: #fcd34d;
        --color-text-danger: #dc2626;
      }
      input, textarea, select {
        border: 0.5px solid var(--color-border-primary);
        border-radius: var(--border-radius-md);
        padding: 6px 9px;
        font-size: 13px;
        outline: none;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        transition: border-color .15s;
      }
      input:focus, textarea:focus { border-color: #7F77DD; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
